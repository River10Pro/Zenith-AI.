<script>

const API_ENDPOINT = "https://zenith-ai-2.onrender.com/chat";
const CREATOR_NAME = "Andrew Rivera";

let userName = localStorage.getItem("userName");
let chatHistory = [];

/* ==============================
   LOADING
============================== */
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loadingScreen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("loadingScreen").style.display = "none";
        }, 600);
    }, 1200);
});

/* ==============================
   USER NAME
============================== */
function checkUserName() {
    if (!userName || userName.trim() === "") {
        userName = prompt("¡Hola! Soy Zenith AI. ¿Cómo te llamas?");
        if (!userName || userName.trim() === "") {
            checkUserName();
        } else {
            localStorage.setItem("userName", userName);
        }
    }
    document.getElementById("welcomeUser").innerText = "Hola, " + userName;
}
checkUserName();

/* ==============================
   RESTORE CHAT
============================== */
const saved = localStorage.getItem("chatHistory");
if (saved) {
    chatHistory = JSON.parse(saved);
    chatHistory.forEach(msg => {
        if (msg.role === "user") addUserMessage(msg.content);
        if (msg.role === "assistant") addBotMessage(msg.content);
    });
} else {
    chatHistory = [];
    addBotMessage(`¡Hola ${userName}! 👋 ¿En qué te ayudo hoy?`);
}

/* ==============================
   PARTICLES BACKGROUND
============================== */
const canvas = document.getElementById("aiBackground");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

class Particle {
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
    }
    update(){
        this.x += this.speedX;
        this.y += this.speedY;
        if(this.x > canvas.width) this.x = 0;
        if(this.x < 0) this.x = canvas.width;
        if(this.y > canvas.height) this.y = 0;
        if(this.y < 0) this.y = canvas.height;
    }
    draw(){
    ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.9)`;
    ctx.shadowBlur = 10;
    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;

    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size + 0.5,0,Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 0; // importante para que no afecte otras cosas
}
}

for(let i=0;i<80;i++){
    particles.push(new Particle());
}

let hue = 0;

function connectParticles() {
    for (let a = 0; a < particles.length; a++) {
        for (let b = a; b < particles.length; b++) {
            let dx = particles[a].x - particles[b].x;
            let dy = particles[a].y - particles[b].y;
            let distance = dx * dx + dy * dy;

            if (distance < 8000) {
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.08)`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);
                ctx.stroke();
            }
        }
    }
}

function drawNebula() {
    let gradient = ctx.createRadialGradient(
        canvas.width / 2,
        canvas.height / 2,
        100,
        canvas.width / 2,
        canvas.height / 2,
        canvas.width / 1.2
    );

    gradient.addColorStop(0, `hsla(${hue}, 100%, 50%, 0.08)`);
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawNebula();

    particles.forEach(p=>{
        p.update();
        p.draw();
    });

    connectParticles();

    hue += 0.3;
    requestAnimationFrame(animate);
}
animate();

/* ==============================
   EMOCIONES Y ANIMACIONES
============================== */
function setEmotion(type){
    const mouth = document.getElementById("aiMouth");
    mouth.className = "ai-mouth " + type;
}


function moveEyes(){
    const eyes = document.querySelectorAll(".eye");
    eyes.forEach(eye=>{
        const x = (Math.random()-0.5)*4;
        const y = (Math.random()-0.5)*4;
        eye.style.transform = `translate(${x}px,${y}px)`;
    });
}
setInterval(moveEyes,2000);

/* ==============================
   CHAT FUNCTIONS
============================== */
function addUserMessage(text){
    let box = document.getElementById("chatBox");
    let msg = document.createElement("div");
    msg.classList.add("message","user");
    msg.innerText = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}

function addBotMessage(text){
    let box = document.getElementById("chatBox");
    let wrapper = document.createElement("div");
    wrapper.classList.add("bot-message");

    let avatar = document.createElement("div");
    avatar.classList.add("bot-avatar");
    avatar.innerText="🤖";

    let msg=document.createElement("div");
    msg.classList.add("message","bot");
    msg.innerText=text;

    wrapper.appendChild(avatar);
    wrapper.appendChild(msg);
    box.appendChild(wrapper);
    box.scrollTop = box.scrollHeight;
}

function detectarEmocion(text){
    const t=text.toLowerCase();

    if(t.includes("feo")||t.includes("tonto")||t.includes("estupido")){
        setEmotion("angry");
        showThought("Eso fue grosero 😠");
    }
    else if(t.includes("gracias")||t.includes("genial")){
        setEmotion("happy");
        showThought("Me agradas 😎");
    }
    else{
        setEmotion("neutral");
    }
}

function sendQuickMessage(text){
    document.getElementById("messageInput").value=text;
    sendMessage();
}

function limpiarChat(){
    localStorage.removeItem("chatHistory");
    document.getElementById("chatBox").innerHTML="";
    chatHistory=[];
}
function showThought(text) {
    const bubble = document.getElementById("thoughtBubble");

    if (!bubble) return;

    bubble.innerText = text;
    bubble.classList.add("active");

    clearTimeout(bubble.timeout);

    bubble.timeout = setTimeout(() => {
        bubble.classList.remove("active");
    }, 3000);
}

/* ==============================
   SEND MESSAGE
============================== */
async function sendMessage(){

    let input=document.getElementById("messageInput");
    let text=input.value.trim();
    if(!text) return;

    addUserMessage(text);
    detectarEmocion(text);
    input.value="";

    // RESPUESTA DIRECTA SOBRE CREADOR
    if(text.toLowerCase().includes("quien te creo") ||
       text.toLowerCase().includes("quién te creó")){
        let reply=`Fui diseñado y desarrollado con dedicación por ${CREATOR_NAME}.`;
		 showThought("Orgulloso de mi creador 😎");
        setEmotion("happy");
       
        addBotMessage(reply);
        setEmotion("neutral");
        return;
    }

    showThought("Pensando...");
    document.getElementById("aiAvatar").classList.add("thinking");
	setEmotion("happy");
    setEmotion("talking");
    document.getElementById("aiStatus").innerText="Pensando...";

    const typing=document.createElement("div");
    typing.classList.add("typing");
    typing.innerHTML="<span></span><span></span><span></span>";
    document.getElementById("chatBox").appendChild(typing);

    try{
        const response=await fetch(API_ENDPOINT,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({messages:[{role:"user",content:text}]})
        });

        typing.remove();

        const data=await response.json();
        let reply=data.choices[0].message.content;

        setEmotion("happy");
        showThought("Ya sé qué decir 😎");
        document.getElementById("aiStatus").innerText="En espera";

        addBotMessage(reply);
        document.getElementById("aiAvatar").classList.remove("thinking");

        chatHistory.push({role:"user",content:text});
        chatHistory.push({role:"assistant",content:reply});
        localStorage.setItem("chatHistory",JSON.stringify(chatHistory));

    }catch(error){
        typing.remove();
        setEmotion("angry");
        showThought("Error 😠");
        addBotMessage("Error conectando con el servidor.");
    }
}


document.getElementById("messageInput")
.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
});

    let lastThought = "";

function randomThought() {

    let random;

    if (document.getElementById("aiMouth").classList.contains("angry")) {
        random = "Estoy un poco molesto 😤";

    setTimeout(() => {
